const chapters = [
{ n:1, section:"C BASICS", title:"C Introduction", body:`
<p class="lead">C is a <span class="mark">general-purpose, procedural</span> programming language created by <b>Dennis Ritchie</b> in 1972 at Bell Labs. It is one of the oldest and most influential languages ever written.</p>
<ul class="points">
<li>C gives very direct, low-level control over memory (through pointers).</li>
<li>It is extremely fast and efficient — often called "close to the hardware."</li>
<li>C is the foundation for many other languages: C++, Java, C#, Python's interpreter (CPython) is written in C.</li>
<li>C is used to build operating systems (Linux, Windows kernel), embedded systems, and compilers.</li>
</ul>
<div class="box tip">Learning C teaches you what's really happening in memory — knowledge that makes every other language easier.</div>
`},
{ n:2, section:"C BASICS", title:"C Get Started", body:`
<p class="lead">To write and run a C program you need just two tools:</p>
<ul class="points">
<li>A <b>text editor</b> (Notepad, VS Code, Sublime) to write the .c file.</li>
<li>A <b>compiler</b> (GCC is the most common) to turn your code into an executable program.</li>
</ul>
<div class="box syntax"><pre>1. Write code    -&gt;  hello.c
2. Compile it    -&gt;  gcc hello.c -o hello
3. Run it        -&gt;  ./hello</pre></div>
`},
{ n:3, section:"C BASICS", title:"C Syntax", body:`
<p class="lead">Here's the smallest working C program, broken into pieces:</p>
<div class="box example"><pre><span class="kw">#include</span> &lt;stdio.h&gt;

<span class="kw">int</span> main() {
    printf(<span class="str">"Hello World!"</span>);
    <span class="kw">return</span> 0;
}</pre></div>
<ul class="points">
<li><b>#include &lt;stdio.h&gt;</b> — brings in the Standard Input/Output library (needed for printf/scanf).</li>
<li><b>int main()</b> — every C program execution starts here.</li>
<li><b>printf()</b> — function used to print text to the screen.</li>
<li><b>return 0;</b> — tells the operating system the program finished successfully.</li>
<li>Don't forget the <b>semicolon ;</b> at the end of every statement!</li>
</ul>
`},
{ n:4, section:"C BASICS", title:"C Output", body:`
<p class="lead">We use <span class="mark">printf()</span> to display output on the screen. It uses special <b>format specifiers</b> to print different data types.</p>
<div class="box syntax"><pre>printf(<span class="str">"%d"</span>, 25);     <span class="cm">// integer</span>
printf(<span class="str">"%f"</span>, 3.14);   <span class="cm">// float</span>
printf(<span class="str">"%c"</span>, 'A');     <span class="cm">// character</span>
printf(<span class="str">"%s"</span>, "Hi");    <span class="cm">// string</span></pre></div>
<div class="box tip">Use <b>\\n</b> inside a string to move output to a new line: printf("Hi\\n");</div>
`},
{ n:5, section:"C BASICS", title:"C Comments", body:`
<p class="lead">Comments are ignored by the compiler; they exist purely to explain code to humans.</p>
<div class="box syntax"><pre><span class="cm">// single-line comment</span>

<span class="cm">/* multi-line
   comment */</span></pre></div>
`},
{ n:6, section:"C BASICS", title:"C Variables", body:`
<p class="lead">A variable is a named location in memory used to store a value that can change.</p>
<div class="box syntax"><pre><span class="kw">int</span> age = 25;
<span class="kw">float</span> price = 19.99;
<span class="kw">char</span> grade = <span class="str">'A'</span>;</pre></div>
<ul class="points">
<li>Every variable in C must be declared with a specific type before use.</li>
<li>Names can contain letters, digits, and underscores but can't start with a digit.</li>
</ul>
`},
{ n:7, section:"C BASICS", title:"C Data Types", body:`
<p class="lead">Data types tell the compiler what kind of value is stored and how much memory it needs.</p>
<div class="box syntax"><pre><span class="kw">int</span>     - whole numbers          (2 or 4 bytes)
<span class="kw">float</span>   - decimal numbers        (4 bytes)
<span class="kw">double</span>  - larger decimal numbers (8 bytes)
<span class="kw">char</span>    - single character       (1 byte)</pre></div>
<div class="box tip">Use the <b>sizeof()</b> operator to check exactly how many bytes a type uses on your system: sizeof(int)</div>
`},
{ n:8, section:"C BASICS", title:"C Constants", body:`
<p class="lead">A constant is a value that <span class="mark">cannot change</span> once defined.</p>
<div class="box syntax"><pre><span class="kw">const</span> <span class="kw">float</span> PI = 3.14159;
<span class="kw">#define</span> MAX_AGE 100   <span class="cm">// preprocessor constant</span></pre></div>
<div class="box tip">By convention, constant names are written in ALL_CAPS to make them easy to spot in code.</div>
`},
{ n:9, section:"C BASICS", title:"C Operators", body:`
<ul class="points">
<li><b>Arithmetic:</b> + − * / %</li>
<li><b>Assignment:</b> = += -= *= /=</li>
<li><b>Comparison:</b> == != &gt; &lt; &gt;= &lt;=</li>
<li><b>Logical:</b> &amp;&amp; || !</li>
<li><b>Bitwise:</b> &amp; | ^ ~ &lt;&lt; &gt;&gt;</li>
</ul>
<div class="box example"><pre><span class="kw">int</span> a = 7, b = 2;
printf(<span class="str">"%d"</span>, a % b); <span class="cm">// 1 (remainder)</span></pre></div>
`},
{ n:10, section:"C BASICS", title:"C Booleans", body:`
<p class="lead">Plain C (before C99) has <span class="mark">no true boolean type</span> — it uses integers instead: 0 means false, any non-zero value means true.</p>
<div class="box example"><pre><span class="kw">int</span> isPassed = (75 &gt; 40); <span class="cm">// 1 (true)</span>
<span class="cm">// modern C can use stdbool.h:</span>
<span class="kw">#include</span> &lt;stdbool.h&gt;
bool done = true;</pre></div>
`},
{ n:11, section:"C BASICS", title:"C User Input", body:`
<p class="lead">We use <span class="mark">scanf()</span> to take input from the keyboard.</p>
<div class="box example"><pre><span class="kw">int</span> age;
printf(<span class="str">"Enter age: "</span>);
scanf(<span class="str">"%d"</span>, &amp;age);
printf(<span class="str">"You are %d"</span>, age);</pre></div>
<div class="box tip">Notice the <b>&amp;</b> before the variable — scanf needs the memory address to store the input into.</div>
`},
{ n:12, section:"C BASICS", title:"C Strings", body:`
<p class="lead">In C, a string is simply an <span class="mark">array of characters</span> ending with a special null character <b>'\\0'</b>.</p>
<div class="box syntax"><pre><span class="kw">char</span> name[] = <span class="str">"Aman"</span>;
printf(<span class="str">"%s"</span>, name);

<span class="cm">// common string functions (string.h):</span>
strlen(name);      <span class="cm">// length</span>
strcpy(dest, src);  <span class="cm">// copy</span>
strcat(a, b);       <span class="cm">// join</span></pre></div>
`},
{ n:13, section:"C BASICS", title:"C Math Functions", body:`
<p class="lead">The <span class="mark">&lt;math.h&gt;</span> library provides ready-made mathematical functions.</p>
<div class="box syntax"><pre><span class="kw">#include</span> &lt;math.h&gt;
sqrt(16);    <span class="cm">// 4.0</span>
pow(2,3);    <span class="cm">// 8.0</span>
abs(-5);     <span class="cm">// 5</span></pre></div>
`},
{ n:14, section:"C BASICS", title:"C If...Else", body:`
<div class="box syntax"><pre><span class="kw">if</span> (condition) {
   <span class="cm">// runs if true</span>
} <span class="kw">else if</span> (condition2) {
   <span class="cm">// runs if condition2 true</span>
} <span class="kw">else</span> {
   <span class="cm">// runs otherwise</span>
}</pre></div>
<div class="box example"><pre><span class="kw">int</span> marks = 85;
<span class="kw">if</span> (marks &gt;= 90) printf(<span class="str">"Grade A"</span>);
<span class="kw">else if</span> (marks &gt;= 75) printf(<span class="str">"Grade B"</span>);
<span class="kw">else</span> printf(<span class="str">"Grade C"</span>);</pre></div>
<div class="box output"><pre>Grade B</pre></div>
`},
{ n:15, section:"C BASICS", title:"C Switch", body:`
<div class="box syntax"><pre><span class="kw">switch</span>(day) {
  <span class="kw">case</span> 1: printf(<span class="str">"Mon"</span>); <span class="kw">break</span>;
  <span class="kw">case</span> 2: printf(<span class="str">"Tue"</span>); <span class="kw">break</span>;
  <span class="kw">default</span>: printf(<span class="str">"Other"</span>);
}</pre></div>
<div class="box tip">Forgetting <b>break;</b> causes "fall-through" into the next case — a very common bug!</div>
`},
{ n:16, section:"C BASICS", title:"C While Loop", body:`
<div class="box syntax"><pre><span class="kw">int</span> i = 0;
<span class="kw">while</span> (i &lt; 5) {
   printf(<span class="str">"%d "</span>, i);
   i++;
}</pre></div>
<div class="box output"><pre>0 1 2 3 4</pre></div>
<div class="box tip"><b>do-while</b> is similar but always executes the loop body at least once.</div>
`},
{ n:17, section:"C BASICS", title:"C For Loop", body:`
<div class="box syntax"><pre><span class="kw">for</span> (<span class="kw">int</span> i = 0; i &lt; 5; i++) {
   printf(<span class="str">"%d "</span>, i);
}</pre></div>
<ul class="points">
<li>Initialization runs once. Condition is checked every round. Increment runs after each round.</li>
</ul>
`},
{ n:18, section:"C BASICS", title:"C Break / Continue", body:`
<div class="box example"><pre><span class="kw">for</span> (<span class="kw">int</span> i = 0; i &lt; 10; i++) {
  <span class="kw">if</span> (i == 5) <span class="kw">break</span>;
  <span class="kw">if</span> (i % 2 == 0) <span class="kw">continue</span>;
  printf(<span class="str">"%d "</span>, i);
}</pre></div>
<div class="box output"><pre>1 3</pre></div>
`},
{ n:19, section:"C BASICS", title:"C Arrays", body:`
<p class="lead">An array stores multiple values of the <span class="mark">same type</span> in one contiguous block of memory.</p>
<div class="box syntax"><pre><span class="kw">int</span> marks[5] = {90, 85, 76, 60, 99};
printf(<span class="str">"%d"</span>, marks[0]); <span class="cm">// 90 (index starts at 0)</span></pre></div>
<div class="box mistake">C does <b>not</b> check array bounds for you — reading or writing marks[10] on a 5-element array silently corrupts nearby memory instead of throwing an error.</div>
`},
{ n:20, section:"C BASICS", title:"C Multidimensional Arrays", body:`
<p class="lead">A 2D array is essentially a "grid" — an array of arrays. Very useful for matrices/tables.</p>
<div class="box syntax"><pre><span class="kw">int</span> matrix[2][3] = {
  {1, 2, 3},
  {4, 5, 6}
};
printf(<span class="str">"%d"</span>, matrix[1][2]); <span class="cm">// 6</span></pre></div>
`},
{ n:21, section:"C ADVANCED", title:"C Pointers", body:`
<p class="lead">A pointer <span class="mark">stores the memory address</span> of another variable, instead of the value itself.</p>
<div class="box syntax"><pre><span class="kw">int</span> age = 25;
<span class="kw">int</span> *ptr = &amp;age;   <span class="cm">// & = address of</span>

printf(<span class="str">"%p"</span>, ptr);   <span class="cm">// prints address</span>
printf(<span class="str">"%d"</span>, *ptr);  <span class="cm">// * = dereference: prints 25</span></pre></div>
<div class="box tip">Pointers are the heart of C — arrays, dynamic memory, and function-by-reference all rely on them.</div>
<div class="box mistake">Using a pointer before it's assigned a valid address ("wild pointer") or after the memory it pointed to was freed ("dangling pointer") are two of the most common C bugs. Always initialise pointers to NULL if unused.</div>
`},
{ n:22, section:"C ADVANCED", title:"C Memory Address", body:`
<p class="lead">Every variable is stored somewhere in the computer's memory, and every location has a unique <span class="mark">address</span>.</p>
<div class="box example"><pre><span class="kw">int</span> age = 43;
printf(<span class="str">"%p"</span>, &amp;age); <span class="cm">// e.g. 0x7ffe1234abcd</span></pre></div>
`},
{ n:23, section:"C ADVANCED", title:"C Functions", body:`
<p class="lead">A function is a reusable named block of code that performs a specific task.</p>
<div class="box syntax"><pre><span class="kw">int</span> add(<span class="kw">int</span> a, <span class="kw">int</span> b) {
   <span class="kw">return</span> a + b;
}

<span class="kw">int</span> main() {
   printf(<span class="str">"%d"</span>, add(3,4)); <span class="cm">// 7</span>
}</pre></div>
`},
{ n:24, section:"C ADVANCED", title:"C Function Parameters", body:`
<p class="lead">C passes arguments <span class="mark">by value</span> by default — the function gets a copy, not the original.</p>
<div class="box example"><pre><span class="kw">void</span> increase(<span class="kw">int</span> x){ x++; }  <span class="cm">// won't change caller's variable</span>

<span class="kw">void</span> increaseRef(<span class="kw">int</span> *x){ (*x)++; } <span class="cm">// pass by pointer works!</span></pre></div>
<div class="box tip">To let a function modify the caller's variable, you must pass a pointer to it.</div>
`},
{ n:25, section:"C ADVANCED", title:"C Recursion", body:`
<div class="box syntax"><pre><span class="kw">int</span> factorial(<span class="kw">int</span> n) {
  <span class="kw">if</span> (n == 0) <span class="kw">return</span> 1;       <span class="cm">// base case</span>
  <span class="kw">return</span> n * factorial(n-1);  <span class="cm">// recursive call</span>
}</pre></div>
<div class="box tip">Always define a base case, or the function will call itself infinitely and crash.</div>
`},
{ n:26, section:"C ADVANCED", title:"C Structures", body:`
<p class="lead">A struct groups different data types together under a single name — useful for representing a "record."</p>
<div class="box syntax"><pre><span class="kw">struct</span> Student {
  <span class="kw">char</span> name[30];
  <span class="kw">int</span> age;
  <span class="kw">float</span> marks;
};

<span class="kw">struct</span> Student s1 = {<span class="str">"Riya"</span>, 20, 88.5};
printf(<span class="str">"%s"</span>, s1.name);</pre></div>
`},
{ n:27, section:"C ADVANCED", title:"C Enums", body:`
<p class="lead">An enum assigns readable <span class="mark">names to a set of integer constants</span>, making code much clearer.</p>
<div class="box syntax"><pre><span class="kw">enum</span> Day {MON, TUE, WED, THU, FRI};
<span class="kw">enum</span> Day today = WED;
printf(<span class="str">"%d"</span>, today); <span class="cm">// 2 (WED is 3rd, index starts at 0)</span></pre></div>
`},
{ n:28, section:"C ADVANCED", title:"C Unions", body:`
<p class="lead">A union looks like a struct, but all its members <span class="mark">share the same memory</span> — only one member can hold a valid value at a time.</p>
<div class="box syntax"><pre><span class="kw">union</span> Data {
  <span class="kw">int</span> i;
  <span class="kw">float</span> f;
};
<span class="kw">union</span> Data d;
d.i = 10;      <span class="cm">// now d.f is meaningless</span></pre></div>
<div class="box tip">Unions save memory — useful when you know only one member will be needed at any given moment.</div>
`},
{ n:29, section:"C ADVANCED", title:"C Storage Classes", body:`
<p class="lead">Storage classes control a variable's <span class="mark">lifetime and visibility (scope)</span>.</p>
<ul class="points">
<li><b>auto</b> — default for local variables; exists only within its block.</li>
<li><b>static</b> — retains its value between function calls.</li>
<li><b>extern</b> — declares a variable defined in another file.</li>
<li><b>register</b> — hints to the compiler to store the variable in a CPU register for speed.</li>
</ul>
<div class="box example"><pre><span class="kw">void</span> counter(){
  <span class="kw">static</span> <span class="kw">int</span> count = 0; <span class="cm">// remembers value each call</span>
  count++;
  printf(<span class="str">"%d"</span>, count);
}</pre></div>
`},
{ n:30, section:"C ADVANCED", title:"C Preprocessor Directives", body:`
<p class="lead">Preprocessor directives run <span class="mark">before compilation</span> — they start with <b>#</b> and manipulate the source code itself.</p>
<div class="box syntax"><pre><span class="kw">#include</span> &lt;stdio.h&gt;   <span class="cm">// include a header file</span>
<span class="kw">#define</span> PI 3.14        <span class="cm">// define a constant/macro</span>
<span class="kw">#ifdef</span> DEBUG ... <span class="kw">#endif</span>  <span class="cm">// conditional compilation</span></pre></div>
`},
{ n:31, section:"C ADVANCED", title:"C Macros", body:`
<p class="lead">A macro is a fragment of code defined with <span class="mark">#define</span> that gets substituted directly wherever it's used, before compiling.</p>
<div class="box syntax"><pre><span class="kw">#define</span> SQUARE(x) ((x) * (x))
printf(<span class="str">"%d"</span>, SQUARE(5)); <span class="cm">// 25</span></pre></div>
<div class="box tip">Always wrap macro parameters in parentheses to avoid unexpected results with operator precedence.</div>
`},
{ n:32, section:"C ADVANCED", title:"C Dynamic Memory Allocation", body:`
<p class="lead">C lets you request memory <span class="mark">at runtime</span> from the heap using functions in &lt;stdlib.h&gt;.</p>
<div class="box syntax"><pre><span class="kw">int</span> *arr = (<span class="kw">int</span>*) malloc(5 * sizeof(<span class="kw">int</span>)); <span class="cm">// allocate</span>
arr = (<span class="kw">int</span>*) realloc(arr, 10 * sizeof(<span class="kw">int</span>)); <span class="cm">// resize</span>
free(arr); <span class="cm">// release memory back</span></pre></div>
<div class="box tip">Every malloc/calloc must be paired with a free() — forgetting this causes a "memory leak."</div>
`},
{ n:33, section:"C ADVANCED", title:"C File Handling", body:`
<p class="lead">C can create, read, and write files using functions from &lt;stdio.h&gt; and the <span class="mark">FILE</span> pointer type.</p>
<div class="box syntax"><pre>FILE *fptr = fopen(<span class="str">"data.txt"</span>, <span class="str">"w"</span>); <span class="cm">// open to write</span>
fprintf(fptr, <span class="str">"Hello File!"</span>);
fclose(fptr);</pre></div>
`},
{ n:34, section:"C ADVANCED", title:"C Read/Write Files", body:`
<div class="box syntax"><pre>FILE *fptr = fopen(<span class="str">"data.txt"</span>, <span class="str">"r"</span>); <span class="cm">// open to read</span>
<span class="kw">char</span> buffer[100];
fgets(buffer, 100, fptr);
printf(<span class="str">"%s"</span>, buffer);
fclose(fptr);</pre></div>
<ul class="points">
<li><b>"r"</b> read, <b>"w"</b> write (overwrite), <b>"a"</b> append, <b>"r+"</b> read & write.</li>
</ul>
`},
{ n:35, section:"C ADVANCED", title:"C Command Line Arguments", body:`
<p class="lead">A C program can receive input directly from the terminal when it starts, through <span class="mark">argc</span> and <span class="mark">argv</span>.</p>
<div class="box syntax"><pre><span class="kw">int</span> main(<span class="kw">int</span> argc, <span class="kw">char</span> *argv[]) {
  printf(<span class="str">"Program name: %s"</span>, argv[0]);
  printf(<span class="str">"Arguments passed: %d"</span>, argc - 1);
}</pre></div>
`},
{ n:36, section:"C ADVANCED", title:"C Error Handling", body:`
<p class="lead">C doesn't have try/catch like C++; instead it uses return codes and the global <span class="mark">errno</span> variable to signal errors.</p>
<div class="box syntax"><pre><span class="kw">#include</span> &lt;errno.h&gt;
FILE *fptr = fopen(<span class="str">"missing.txt"</span>, <span class="str">"r"</span>);
<span class="kw">if</span> (fptr == NULL) {
   printf(<span class="str">"Error: %s"</span>, strerror(errno));
   exit(1);
}</pre></div>
<div class="box tip">Always check return values (like fopen returning NULL) — C will not stop you from making mistakes!</div>
`},
{ n:37, section:"C MORE TOPICS", title:"C Typedef", body:`
<p class="lead">typedef lets you create a new, more readable <span class="mark">alias name</span> for an existing type.</p>
<div class="box syntax"><pre><span class="kw">typedef</span> <span class="kw">unsigned</span> <span class="kw">int</span> uint;
uint age = 25;   <span class="cm">// same as: unsigned int age = 25;</span>

<span class="kw">typedef struct</span> {
  <span class="kw">char</span> name[30];
  <span class="kw">int</span> age;
} Student;
Student s1;      <span class="cm">// no need to write "struct Student" every time</span></pre></div>
`},
{ n:38, section:"C MORE TOPICS", title:"C Ternary Operator", body:`
<p class="lead">The ternary operator <span class="mark">? :</span> is a compact one-line shortcut for a simple if...else.</p>
<div class="box syntax"><pre>condition ? valueIfTrue : valueIfFalse;</pre></div>
<div class="box example"><pre><span class="kw">int</span> age = 20;
<span class="kw">char</span> *status = (age &gt;= 18) ? <span class="str">"Adult"</span> : <span class="str">"Minor"</span>;
printf(<span class="str">"%s"</span>, status);</pre></div>
<div class="box output"><pre>Adult</pre></div>
`},
{ n:39, section:"C MORE TOPICS", title:"C Bitwise Operators (In Detail)", body:`
<p class="lead">Bitwise operators work directly on the individual <span class="mark">bits</span> of a number — very fast, often used in embedded programming.</p>
<div class="box syntax"><pre><span class="kw">int</span> a = 5;   <span class="cm">// 0101</span>
<span class="kw">int</span> b = 3;   <span class="cm">// 0011</span>

a &amp; b;   <span class="cm">// 0001 = 1   (AND)</span>
a | b;   <span class="cm">// 0111 = 7   (OR)</span>
a ^ b;   <span class="cm">// 0110 = 6   (XOR)</span>
a &lt;&lt; 1;  <span class="cm">// 1010 = 10  (left shift = multiply by 2)</span>
a &gt;&gt; 1;  <span class="cm">// 0010 = 2   (right shift = divide by 2)</span></pre></div>
`}
];

const root = document.getElementById('root');
const jumpSelect = document.getElementById('jumpSelect');

let indexHtml = `
<div class="page" id="index">
  <div class="badge">
    <div class="brand"><div class="dot">C</div><span>Handwritten Notes</span><span class="author-tag">by Himanshu Dalak</span></div>
    <div class="pagebox">Page No. | Date</div>
  </div>
  <h1 class="big-title">INDEX</h1>
  <div class="section-label">C Basics</div>
  <ul class="index-list">
`;
chapters.filter(c=>c.section==="C BASICS").forEach(c=>{
  indexHtml += `<li><span class="num">${c.n}.</span> <a href="#ch${c.n}">${c.title}</a></li>`;
});
indexHtml += `</ul><div class="section-label">C Advanced</div><ul class="index-list">`;
chapters.filter(c=>c.section==="C ADVANCED").forEach(c=>{
  indexHtml += `<li><span class="num">${c.n}.</span> <a href="#ch${c.n}">${c.title}</a></li>`;
});
indexHtml += `</ul><div class="section-label">More Topics</div><ul class="index-list">`;
chapters.filter(c=>c.section==="C MORE TOPICS").forEach(c=>{
  indexHtml += `<li><span class="num">${c.n}.</span> <a href="#ch${c.n}">${c.title}</a></li>`;
});
indexHtml += `</ul></div>`;

root.innerHTML = indexHtml;

chapters.forEach((c, idx)=>{
  const prev = chapters[idx-1];
  const next = chapters[idx+1];
  const page = document.createElement('div');
  page.className = 'page';
  page.id = `ch${c.n}`;
  page.innerHTML = `
    <div class="badge">
      <div class="brand"><div class="dot">C</div><span class="chapter-num">${c.section}</span><span class="author-tag">by Himanshu Dalak</span></div>
      <div class="pagebox">Chapter ${c.n}</div>
    </div>
    <h2 class="chap-title"><span class="clang">C</span> ${c.title.replace(/^C\s*/,'')}</h2>
    ${c.body}
    <div class="nav-btns">
      <a href="#${prev ? 'ch'+prev.n : 'index'}">&larr; ${prev ? prev.title : 'Index'}</a>
      <a href="#index">Index ☰</a>
      <a href="#${next ? 'ch'+next.n : 'index'}">${next ? next.title : 'Index'} &rarr;</a>
    </div>
  `;
  root.appendChild(page);

  const opt = document.createElement('option');
  opt.value = `ch${c.n}`;
  opt.textContent = `${c.n}. ${c.title}`;
  jumpSelect.appendChild(opt);
});
</script>
